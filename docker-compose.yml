services:
  db:
    image: postgres:15
    container_name: caja-ahorro-db
    environment:
      POSTGRES_DB: caja_ahorro
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: caja-ahorro-api
    ports:
      - "8080:8080"
    environment:
      spring.datasource.url: jdbc:postgresql://db:5432/caja_ahorro
      spring.datasource.username: user
      spring.datasource.password: password
      spring.jpa.hibernate.ddl-auto: update
    depends_on:
      - db

volumes:
  postgres_data:
